<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Chip Remove</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>ease-chip-remove</h1>

    <div class="chip-container">

        <span class="ease-chip primary">
            Design
            <button class="ease-chip-remove">&times;</button>
        </span>

        <span class="ease-chip success">
            React
            <button class="ease-chip-remove">&times;</button>
        </span>

        <span class="ease-chip warning slide">
            CSS
            <button class="ease-chip-remove">&times;</button>
        </span>

        <span class="ease-chip danger">
            JavaScript
            <button class="ease-chip-remove">&times;</button>
        </span>

    </div>

    <button id="addChip">Add Chip</button>

</div>

<script>
const container = document.querySelector(".chip-container");

document.addEventListener("click", e => {

    if (e.target.classList.contains("ease-chip-remove")) {

        const chip = e.target.parentElement;

        if (chip.classList.contains("slide")) {
            chip.classList.add("slide-remove");
        } else {
            chip.classList.add("removing");
        }

        chip.addEventListener("animationend", () => chip.remove(), { once: true });
    }

});

document.getElementById("addChip").onclick = () => {

    const chip = document.createElement("span");

    chip.className = "ease-chip primary";

    chip.innerHTML = `
        New Chip
        <button class="ease-chip-remove">&times;</button>
    `;

    container.appendChild(chip);

}
</script>

</body>
</html>
